<!doctype html>
<html>
	<head>
		<title>interactive website</title>
		<style>
			.section{
				padding:20px;
				margin-bottom:20px ;
				border-radius:15px;
				border:2px solid rgb(169, 196, 196);
			}
			button:hover{
				background-color:rgb(170, 170, 191);
        color: white;
       }
		</style>
	</head>
	<body id='body'>
		<div>
			<button id='dark' onclick='dark()'>Dark Mode</button>
		</div>
		<div class='section'>
			<h1>Password Strength Checker</h1>
			<label>please enter password:</label>
			<input type='text' id='password' placeholder="create a passsword here" >
			<button onclick='check()'>Check Password</button>
			<h3 id='result'></h3>
		</div>

		<div class='section'>
			<h1>Security Clearance System</h1>
        <label>Age:</label>
        <input type='text' id='age'><br>
        <label>Employee ID:</label>
        <input type='text' id='emId' placeholder="start with EMP or SEC"><br>
        <label>Years of experience:</label>
        <input type='text' id='experience'><br>
        <button onclick='checkClearance()'>Check Clearance</button>
        <h3 id='clearanceResult'></h3>
		</div>

		<div class='section'>
		    <h1>Sign up / Login Simulator</h1>
            <label>Name:</label>
            <input type='text' id='name'><br>
            <label>Password:</label>
            <input type='password' id='psw'><br>
            <button onclick='getpsw()'>sign up</button>
            <button onclick='signin()'>log in</button>
            <h3 id='result2' class="result"></h3>	
		</div>

		<div class='section'>
			<h1>Cyber Threat Detector</h1>
        <label>Website URL:</label>
        <input type='text' id='url' placeholder="start with https://"><br>
        <button onclick='analyze()'>Analyze Website</button>
        <h3 id='threatResult'></h3>
		</div>
		<script>
			//section 1 Password Strength Checker //
			function check(){
				let password = document.getElementById('password').value;
				let result = '';
				if(password.length<12){
					result+='Password too short.<br>';
				}
				if (!/[A-Z]/.test(password)) {
                    result += 'Missing uppercase letter <br>';
                }
                if (!/[a-z]/.test(password)) {
                  result += 'Missing lowercase letter <br>';
                }
                if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~`]/.test(password)) {
                  result += 'Missing punctuation <br>';
                }
                if (password.includes(' ')) {
                  result += 'Password cannot contain spaces <br>';
                }
                if(password.length >= 12 && /[A-Z]/.test(password) && /[a-z]/.test(password) && /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~`]/.test(password) &&!password.includes(' ')){
                    result = 'Strong Password';
                }
                document.getElementById('result').innerHTML = result;
            }
            //section 2 Security Clearance System//
            function checkClearance() {
            let age = document.getElementById('age').value;
            let emId = document.getElementById('emId').value;
            let experience = document.getElementById('experience').value;
            if (!emId.startsWith('EMP') && !emId.startsWith('SEC')) {
               document.getElementById('clearanceResult').innerHTML = 'invalid employee ID';
                return;
            }
            if (age >= 25 && experience >= 5 && emId.startsWith('SEC')) {
                document.getElementById('clearanceResult').innerHTML = 'Access Granted: Level 3';
                return;
            }
            if (age >= 21 && experience >= 2 && emId.startsWith('EMP')) {
                document.getElementById('clearanceResult').innerHTML = 'Access Granted: Level 2';
                return;
            }
            if (age >= 18 && emId.startsWith('EMP')) {
                document.getElementById('clearanceResult').innerHTML = 'Access Granted: Level 1';
                return;
            }
            document.getElementById('clearanceResult').innerHTML = 'invalid employee ID';
        }
            
          //section 3 Sign up / Login Simulator //
            let database = [];
            function getpsw(){
            	let user_entered = document.getElementById('name').value;
              let psw_entered = document.getElementById('psw').value;
              let pair = (user_entered + ' ' + psw_entered).split(' ');
            database.push(pair);
            document.getElementById('result2').innerHTML = 'registration ok!';
            }

            function signin(){
            let user_entered = document.getElementById('name').value;
            let psw_entered = document.getElementById('psw').value;
            for (let i = 0; i < database.length; i++) {
                if (database[i][0] == user_entered && database[i][1] == psw_entered) {
                   document.getElementById('result2').innerHTML = 'Login Successful';
                    return;
                }
               }
            for (let i = 0; i < database.length; i++) {
                if (database[i][0] == user_entered) {
                    document.getElementById('result2').innerHTML = 'Incorrect password';
                    return;
                }
            }
            document.getElementById('result2').innerHTML = 'Username not found';
        }

        //section 5 Cyber Threat Detector//
        function analyze(){
        	let url = document.getElementById('url').value;
          let suspicious = false;
            if (url.includes('free-money')) {
                suspicious = true;
            }
            if (url.includes('hack')) {
                suspicious = true;
            }
            if (url.includes('winner')) {
                suspicious = true;
            }
            if (url.includes('bitcoin')) {
                suspicious = true;
            }

            let link = url.startsWith('https://');
            if (link){
                document.getElementById('threatResult').innerHTML = 'Safe Website';
            } 
            else if (!link && suspicious) {
                document.getElementById('threatResult').innerHTML = 'Dangerous Website';
            } 
            else if (!link && !suspicious) {
                document.getElementById('threatResult').innerHTML = 'Suspicious Website';
            } 
            else {
                document.getElementById('threatResult').innerHTML = 'Please enter a valid URL';
            }
        }
        //section 4 dark mode button//
        function dark(){
        	let body = document.getElementById('body');
          let dark = document.getElementById('dark');
          if (body.style.backgroundColor =='black') {
                body.style.backgroundColor = 'white';
                body.style.color = 'black';
                dark.innerHTML = 'Dark Mode';
            } 
            else {
                body.style.backgroundColor = 'black';
                body.style.color = 'white';
                dark.innerHTML = 'Light Mode';
            }
        }        
		</script>
	</body>
</html>
